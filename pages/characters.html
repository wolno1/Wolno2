<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Characters - Wolno's Comic Universe</title>

	<!-- Favicon -->
	<link rel="icon" type="image/x-icon" href="../assets/images/site/icon.jpg">

	<!-- CSS Files -->
	<link rel="stylesheet" href="../styles/global.css">
	<link rel="stylesheet" href="../styles/components/navigation.css">
	<link rel="stylesheet" href="../styles/components/footer.css">
	<link rel="stylesheet" href="../styles/components/paysites.css">
	<link rel="stylesheet" href="../styles/pages/characters.css">

	<!-- Meta Tags -->
	<meta name="description" content="Meet the cast from Wolno's comic universe. Browse Inu-sual Feelings and McThingies characters and jump to each wiki entry.">
	<meta name="keywords" content="Wolno, Characters, Inu-sual Feelings, McThingies, Wiki, Inu, Chloe, Laika, Roxanne, Skye, Abigail, Milo">
	<meta name="author" content="Wolno">

	<!-- Open Graph / Facebook -->
	<meta property="og:type" content="website">
	<meta property="og:url" content="">
	<meta property="og:title" content="Characters - Wolno's Comic Universe">
	<meta property="og:description" content="Meet the cast from Wolno's comic universe. Browse Inu-sual Feelings and McThingies characters and jump to each wiki entry.">
	<meta property="og:image" content="../assets/images/portraits/inu.png">

	<!-- Twitter -->
	<meta property="twitter:card" content="summary_large_image">
	<meta property="twitter:url" content="">

</head>
<body>
	<!-- ===== SITE NAVIGATION ===== -->
	<div data-component="navigation">
		<!-- Navigation will be loaded here -->
	</div>

	<!-- ===== MAIN CONTENT ===== -->
	<main class="main-content characters-page" id="mainContent">
		<section class="characters-hero">
			<div class="container hero-content">
				<h1 class="characters-title">Characters</h1>
				<p class="characters-subtitle">Browse every familiar face from my comics and jump to their wiki pages.</p>
			</div>
		</section>

		<section class="characters-content">
			<div class="container">
				<!-- Inu-sual Feelings Cast -->
				<article class="comic-character-block inusual-block" aria-labelledby="inusualTitle">
					<header class="comic-header">
						<h2 id="inusualTitle" class="sr-only">Inu-sual Feelings characters</h2>
					</header>

					<div class="inusual-layout">
						<div class="character-column left-column" role="list" aria-label="Inu-sual Feelings supporting cast">
							<a href="wiki/characters/milo.html" class="character-card inusual" role="listitem" aria-label="Open Milo wiki page">
								<img src="../assets/images/portraits/milo.png" alt="Milo portrait" class="character-avatar" loading="lazy">
								<span class="character-name">Milo</span>
							</a>

							<a href="wiki/characters/roxanne.html" class="character-card inusual" role="listitem" aria-label="Open Roxanne wiki page">
								<img src="../assets/images/portraits/roxanne.png" alt="Roxanne portrait" class="character-avatar" loading="lazy">
								<span class="character-name">Roxanne</span>
							</a>

							<a href="wiki/characters/skye.html" class="character-card inusual" role="listitem" aria-label="Open Skye wiki page">
								<img src="../assets/images/portraits/skye.png" alt="Skye portrait" class="character-avatar" loading="lazy">
								<span class="character-name">Skye</span>
							</a>
						</div>

						<a href="reader.html?comic=inusual-feelings" class="comic-logo-link" aria-label="Read Inu-sual Feelings">
							<img src="../assets/images/cards/Inu-sual feelings.png" alt="Inu-sual Feelings logo" class="comic-logo inusual-logo" loading="eager">
						</a>

						<div class="character-column right-column" role="list" aria-label="Inu-sual Feelings main cast">
							<a href="wiki/characters/inu.html" class="character-card inusual" role="listitem" aria-label="Open Inu wiki page">
								<img src="../assets/images/portraits/inu.png" alt="Inu portrait" class="character-avatar" loading="lazy">
								<span class="character-name">Inu</span>
							</a>

							<a href="wiki/characters/chloe.html" class="character-card inusual" role="listitem" aria-label="Open Chloe wiki page">
								<img src="../assets/images/portraits/chloe.png" alt="Chloe portrait" class="character-avatar" loading="lazy">
								<span class="character-name">Chloe</span>
							</a>

							<a href="wiki/characters/laika.html" class="character-card inusual" role="listitem" aria-label="Open Laika wiki page">
								<img src="../assets/images/portraits/laika.png" alt="Laika portrait" class="character-avatar" loading="lazy">
								<span class="character-name">Laika</span>
							</a>
						</div>
					</div>
				</article>

				<!-- McThingies Cast -->
				<article class="comic-character-block mcthingies-block" aria-labelledby="mcthingiesTitle">
					<header class="comic-header">
						<h2 id="mcthingiesTitle" class="sr-only">McThingies characters</h2>
					</header>

					<div class="mcthingies-layout">
						<a href="wiki/characters/abigail.html" class="character-card mcthingies" aria-label="Open Abigail wiki page">
							<img src="../assets/images/portraits/abigail.png" alt="Abigail portrait" class="character-avatar" loading="lazy">
							<span class="character-name">Abigail</span>
						</a>

						<a href="reader.html?comic=mcthingies" class="comic-logo-link" aria-label="Read McThingies">
							<img src="../assets/images/cards/McThingies.png" alt="McThingies logo" class="comic-logo mcthingies-logo" loading="lazy">
						</a>

						<a href="wiki/characters/milo.html" class="character-card mcthingies" aria-label="Open Milo wiki page">
							<img src="../assets/images/portraits/milo.png" alt="Milo portrait" class="character-avatar" loading="lazy">
							<span class="character-name">Milo</span>
						</a>
					</div>
				</article>
			</div>
		</section>
	</main>

	<!-- ===== FOOTER ===== -->
	<div data-component="footer">
		<!-- Footer will be loaded here -->
	</div>

	<!-- ===== PAYSITE BUTTONS ===== -->
	<div class="paysite-buttons">
		<!-- Paysite buttons will be loaded here -->
	</div>

	<!-- Scripts -->
	<script src="../scripts/load-components.js"></script>

</html>
