<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Portfolio - Wolno</title>

	<!-- Favicon -->
	<link rel="icon" type="image/x-icon" href="../assets/images/site/icon.jpg">

	<!-- CSS Files -->
	<link rel="stylesheet" href="../styles/global.css">
	<link rel="stylesheet" href="../styles/components/navigation.css">
	<link rel="stylesheet" href="../styles/components/footer.css">
	<link rel="stylesheet" href="../styles/components/paysites.css">
	<link rel="stylesheet" href="../styles/pages/portfolio.css">

	<!-- Meta Tags -->
	<meta name="description" content="Explore Wolno's art portfolio with an interactive gallery sorted from newest to oldest pieces.">
	<meta name="keywords" content="Wolno, Portfolio, Art Gallery, Illustrations">
	<meta name="author" content="Wolno, AwsArtzzz">
</head>
<body>
	<!-- ===== SITE NAVIGATION ===== -->
	<div data-component="navigation"></div>

	<!-- ===== MAIN CONTENT ===== -->
	<main class="main-content" id="mainContent">
		<section class="portfolio-section" id="portfolioSection">
			<header class="portfolio-intro">
				<h1 class="portfolio-title">Portfolio</h1>
				<p class="portfolio-summary">Browse my work by collection, subject, and medium.</p>
			</header>
			<div class="portfolio-layout">
				<aside class="portfolio-filter-panel" aria-label="Filter portfolio">
					<button class="mobile-filter-toggle" id="portfolioFilterToggle" type="button" aria-expanded="false" aria-controls="portfolioFilterPanel">
						<span>Filters &amp; years</span>
						<span class="mobile-filter-count" id="portfolioMobileCount"></span>
					</button>
					<div class="filter-panel-inner" id="portfolioFilterPanel">
						<fieldset class="filter-group filter-mode-group">
							<legend>Show</legend>
							<label class="filter-option"><input type="radio" name="portfolioMode" value="best" checked><span>Best works</span></label>
							<label class="filter-option"><input type="radio" name="portfolioMode" value="all"><span>All</span></label>
						</fieldset>
						<fieldset class="filter-group">
							<legend>Filter by tag</legend>
							<div class="filter-checkboxes" id="portfolioTagFilters"></div>
						</fieldset>
						<div class="filter-actions">
							<button class="filter-clear" id="portfolioClearFilters" type="button">Clear tags</button>
						</div>
						<nav class="year-jump" aria-label="Jump to portfolio year">
							<p class="year-jump-title">Jump to year</p>
							<div class="year-jump-list" id="portfolioYearJump"></div>
						</nav>
					</div>
				</aside>

				<div class="portfolio-results">
					<p class="portfolio-result-count" id="portfolioResultCount" aria-live="polite"></p>
					<div class="portfolio-grid" id="portfolioGrid"></div>
					<p class="portfolio-empty" id="portfolioEmpty" hidden>No artwork matches these filters.</p>
				</div>
			</div>
		</section>
	</main>

	<!-- ===== LIGHTBOX ===== -->
	<div class="portfolio-lightbox" id="portfolioLightbox" aria-hidden="true" role="dialog" aria-modal="true">
		<button class="lightbox-close" type="button" aria-label="Close">&times;</button>
		<button class="lightbox-nav lightbox-prev" type="button" aria-label="Previous artwork">&#10094;</button>
		<figure class="lightbox-figure">
			<img id="lightboxImage" src="" alt="" loading="eager">
			<figcaption class="lightbox-caption">
				<p class="lightbox-date" id="lightboxDate"></p>
				<p class="lightbox-description" id="lightboxDescription"></p>
			</figcaption>
		</figure>
		<button class="lightbox-nav lightbox-next" type="button" aria-label="Next artwork">&#10095;</button>
	</div>

	<!-- ===== FOOTER ===== -->
	<div data-component="footer"></div>

	<!-- ===== PAYSITE BUTTONS ===== -->
	<div class="paysite-buttons"></div>

	<!-- Scripts -->
	<script src="../scripts/load-components.js" defer></script>
	<script src="../scripts/data/portfolio-data.js" defer></script>
	<script src="../scripts/pages/portfolio.js" defer></script>
</body>
</html>
